<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨ Psychometrician Reviewer ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sky: #7dd3fc; --sky-light: #bae6fd; --sky-soft: #e0f2fe;
    --sky-deep: #38bdf8; --sky-dark: #0284c7;
    --accent: #f9a8d4; --text: #0c4a6e; --text-soft: #3b82a0;
    --correct-dark: #15803d; --wrong-dark: #b91c1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 40%, #fce7f3 100%);
    min-height: 100vh; color: var(--text); position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(125,211,252,0.25) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(249,168,212,0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(196,181,253,0.15) 0%, transparent 50%);
  }
  .bubble {
    position: fixed; border-radius: 50%; opacity: 0.15;
    animation: floatBubble linear infinite; pointer-events: none; z-index: 0;
  }
  @keyframes floatBubble {
    0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
    10% { opacity: 0.15; } 90% { opacity: 0.1; }
    100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
  }
  .app {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px;
  }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.8s ease both; }
  .header .emoji-row { font-size: 2rem; letter-spacing: 6px; margin-bottom: 8px; animation: wiggle 3s ease-in-out infinite; }
  @keyframes wiggle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
  .header h1 {
    font-family: 'Nunito', sans-serif; font-size: clamp(1.6rem, 5vw, 2.6rem); font-weight: 900;
    background: linear-gradient(135deg, #0284c7, #7dd3fc, #f9a8d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.2; margin-bottom: 6px;
  }
  .header p { color: var(--text-soft); font-size: 0.95rem; font-weight: 600; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  .breadcrumb {
    display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 700;
    color: var(--text-soft); margin-bottom: 24px; flex-wrap: wrap; justify-content: center;
    animation: fadeIn 0.5s ease both;
  }
  .breadcrumb span { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span:hover { color: var(--sky-dark); }
  .breadcrumb .sep { opacity: 0.4; }
  .breadcrumb .active { color: var(--sky-dark); }
  .screen { width: 100%; max-width: 700px; animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .section-title {
    text-align: center; font-family: 'Nunito', sans-serif; font-size: 1.15rem; font-weight: 800;
    color: var(--text); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.4); border-radius: 20px; padding: 22px 20px;
    cursor: pointer; transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden;
    box-shadow: 0 4px 20px rgba(125,211,252,0.12);
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(125,211,252,0.12), rgba(249,168,212,0.08));
    opacity: 0; transition: opacity 0.25s;
  }
  .card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--sky-deep); box-shadow: 0 12px 36px rgba(56,189,248,0.2); }
  .card:hover::before { opacity: 1; }
  .card:active { transform: scale(0.98); }
  .card-icon {
    width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center;
    justify-content: center; font-size: 1.6rem; flex-shrink: 0;
    background: linear-gradient(135deg, var(--sky-light), var(--sky-soft));
    box-shadow: 0 4px 12px rgba(125,211,252,0.3);
  }
  .card-content { flex: 1; }
  .card-title { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 3px; }
  .card-desc { font-size: 0.78rem; color: var(--text-soft); font-weight: 600; }
  .card-arrow { font-size: 1.1rem; color: var(--sky-deep); opacity: 0; transform: translateX(-4px); transition: all 0.25s; }
  .card:hover .card-arrow { opacity: 1; transform: translateX(0); }
  .sets-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 400px) { .sets-grid { grid-template-columns: 1fr; } }
  .set-card {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.35); border-radius: 18px; padding: 20px 16px;
    cursor: pointer; transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    text-align: center; box-shadow: 0 4px 16px rgba(125,211,252,0.1);
  }
  .set-card:hover { transform: translateY(-4px) scale(1.04); border-color: var(--sky-deep); box-shadow: 0 12px 30px rgba(56,189,248,0.2); background: rgba(255,255,255,0.9); }
  .set-card:active { transform: scale(0.97); }
  .set-icon { font-size: 2rem; margin-bottom: 8px; }
  .set-label { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.05rem; color: var(--text); margin-bottom: 3px; }
  .set-count { font-size: 0.75rem; color: var(--text-soft); font-weight: 600; }
  .quiz-header {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.35); border-radius: 20px; padding: 16px 20px;
    margin-bottom: 20px; box-shadow: 0 4px 20px rgba(125,211,252,0.1);
  }
  .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .quiz-progress-label { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--text); }
  .quiz-score-badge {
    background: linear-gradient(135deg, var(--sky-light), #e0f2fe); border: 1.5px solid var(--sky);
    border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 700; color: var(--sky-dark);
  }
  .progress-bar-track { height: 10px; background: var(--sky-soft); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--sky-deep), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .question-card {
    background: rgba(255,255,255,0.82); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.35); border-radius: 20px; padding: 24px 22px;
    margin-bottom: 18px; box-shadow: 0 4px 24px rgba(125,211,252,0.12);
  }
  .question-num {
    display: inline-block; background: linear-gradient(135deg, var(--sky-deep), #0ea5e9); color: white;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.75rem;
    padding: 3px 10px; border-radius: 99px; margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .question-text { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.55; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: rgba(255,255,255,0.8); border: 2px solid rgba(125,211,252,0.4); border-radius: 14px;
    padding: 13px 16px; cursor: pointer; text-align: left; font-family: 'Quicksand', sans-serif;
    font-size: 0.92rem; font-weight: 600; color: var(--text);
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden;
  }
  .choice-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(125,211,252,0.1), rgba(249,168,212,0.05));
    opacity: 0; transition: opacity 0.2s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--sky-deep); transform: translateX(4px); box-shadow: 0 4px 16px rgba(56,189,248,0.18); }
  .choice-btn:hover:not(:disabled)::before { opacity: 1; }
  .choice-letter {
    width: 28px; height: 28px; border-radius: 8px; background: var(--sky-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.8rem;
    color: var(--sky-dark); flex-shrink: 0; transition: all 0.2s;
  }
  .choice-btn:disabled { cursor: default; transform: none !important; }
  .choice-btn.correct { border-color: #4ade80; background: rgba(134,239,172,0.2); animation: correctPop 0.4s cubic-bezier(.34,1.56,.64,1); }
  .choice-btn.correct .choice-letter { background: #4ade80; color: white; }
  .choice-btn.wrong { border-color: #f87171; background: rgba(252,165,165,0.2); animation: shake 0.4s ease; }
  .choice-btn.wrong .choice-letter { background: #f87171; color: white; }
  .choice-btn.reveal-correct { border-color: #4ade80; background: rgba(134,239,172,0.12); opacity: 0.75; }
  .choice-btn.reveal-correct .choice-letter { background: #4ade80; color: white; }
  @keyframes correctPop { 0%{transform:scale(1);} 50%{transform:scale(1.03);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
  .feedback-box {
    margin-top: 14px; padding: 12px 16px; border-radius: 14px; font-size: 0.88rem; font-weight: 700;
    display: flex; align-items: flex-start; gap: 10px; animation: fadeIn 0.3s ease;
  }
  .correct-fb { background: rgba(134,239,172,0.2); border: 1.5px solid #4ade80; color: var(--correct-dark); }
  .wrong-fb { background: rgba(252,165,165,0.2); border: 1.5px solid #f87171; color: var(--wrong-dark); }
  .feedback-icon { font-size: 1.1rem; flex-shrink: 0; }
  .next-btn {
    display: block; width: 100%; margin-top: 16px; padding: 14px;
    background: linear-gradient(135deg, var(--sky-deep), #0ea5e9); color: white; border: none;
    border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 6px 20px rgba(56,189,248,0.35); letter-spacing: 0.3px;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(56,189,248,0.45); }
  .next-btn:active { transform: scale(0.98); }
  .results-card {
    background: rgba(255,255,255,0.82); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.4); border-radius: 24px; padding: 36px 28px;
    text-align: center; box-shadow: 0 8px 40px rgba(125,211,252,0.15);
    animation: resultsPop 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes resultsPop { from{opacity:0;transform:scale(0.85);} to{opacity:1;transform:scale(1);} }
  .results-emoji { font-size: 3.5rem; margin-bottom: 12px; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .results-title { font-family:'Nunito',sans-serif; font-size:1.6rem; font-weight:900; color:var(--text); margin-bottom:6px; }
  .results-sub { color:var(--text-soft); font-weight:600; font-size:0.9rem; margin-bottom:24px; }
  .score-circle {
    width:130px; height:130px; border-radius:50%;
    background:linear-gradient(135deg,var(--sky-light),#e0f2fe); border:4px solid var(--sky-deep);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    margin:0 auto 24px; box-shadow:0 8px 28px rgba(56,189,248,0.22);
  }
  .score-num { font-family:'Nunito',sans-serif; font-size:2.4rem; font-weight:900; color:var(--sky-dark); line-height:1; }
  .score-total { font-size:0.78rem; font-weight:700; color:var(--text-soft); }
  .score-pct { font-size:0.88rem; font-weight:700; color:var(--sky-dark); margin-top:2px; }
  .results-message {
    background:linear-gradient(135deg,var(--sky-soft),#fce7f3); border:1.5px solid rgba(125,211,252,0.4);
    border-radius:16px; padding:14px 18px; font-size:0.92rem; font-weight:700;
    color:var(--text); line-height:1.5; margin-bottom:24px;
  }
  .results-btns { display:flex; gap:12px; flex-wrap:wrap; }
  .btn-outline {
    flex:1; padding:13px; background:transparent; border:2px solid var(--sky-deep);
    border-radius:14px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:800;
    color:var(--sky-dark); cursor:pointer; transition:all 0.2s;
  }
  .btn-outline:hover { background:var(--sky-soft); transform:translateY(-2px); }
  .btn-primary {
    flex:1; padding:13px; background:linear-gradient(135deg,var(--sky-deep),#0ea5e9); border:none;
    border-radius:14px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:800;
    color:white; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(56,189,248,0.3);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(56,189,248,0.4); }
  .back-btn {
    display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
    background:rgba(255,255,255,0.7); border:1.5px solid rgba(125,211,252,0.5); border-radius:20px;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:0.85rem; color:var(--sky-dark);
    cursor:pointer; margin-bottom:20px; transition:all 0.2s; box-shadow:0 2px 8px rgba(125,211,252,0.12);
  }
  .back-btn:hover { background:rgba(255,255,255,0.9); transform:translateX(-2px); border-color:var(--sky-deep); }
  .footer { text-align:center; margin-top:40px; font-size:0.78rem; color:var(--text-soft); font-weight:600; opacity:0.7; }

  /* ── DARK MODE ── */
  body.dark {
    --sky: #38bdf8; --sky-light: #0c4a6e; --sky-soft: #082f49; --sky-deep: #7dd3fc;
    --sky-dark: #bae6fd; --accent: #f9a8d4; --text: #e0f2fe; --text-soft: #7dd3fc;
    --correct-dark: #4ade80; --wrong-dark: #f87171;
  }
  body.dark { background: linear-gradient(135deg, #0a1628 0%, #0d1f35 40%, #1a0e2e 100%); }
  body.dark .card,
  body.dark .set-card,
  body.dark .quiz-header,
  body.dark .question-card,
  body.dark .results-card,
  body.dark .back-btn { background: rgba(10,22,44,0.75); border-color: rgba(56,189,248,0.25); }
  body.dark .choice-btn { background: rgba(10,22,44,0.7); border-color: rgba(56,189,248,0.25); color: var(--text); }
  body.dark .choice-btn:hover:not(:disabled) { background: rgba(56,189,248,0.08); }
  body.dark .choice-letter { background: rgba(56,189,248,0.15); color: var(--sky-deep); }
  body.dark .quiz-score-badge { background: linear-gradient(135deg,#082f49,#0c4a6e); border-color: var(--sky); color: var(--sky-deep); }
  body.dark .progress-bar-track { background: #082f49; }
  body.dark .results-message { background: linear-gradient(135deg,#082f49,#1a0e2e); border-color: rgba(56,189,248,0.25); }
  body.dark .score-circle { background: linear-gradient(135deg,#0c4a6e,#082f49); border-color: var(--sky-deep); }
  body.dark .btn-outline { border-color: var(--sky-deep); color: var(--sky-deep); }
  body.dark .btn-outline:hover { background: rgba(56,189,248,0.1); }
  body.dark .missed-item { background: rgba(10,22,44,0.7); border-color: rgba(56,189,248,0.2); }
  body.dark .streak-widget { background: rgba(10,22,44,0.8); border-color: rgba(249,168,212,0.3); }

  /* ── DARK MODE TOGGLE ── */
  .dark-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
    border: 2px solid rgba(125,211,252,0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 4px 16px rgba(125,211,252,0.2);
  }
  .dark-toggle:hover { transform: scale(1.1) rotate(15deg); }
  body.dark .dark-toggle { background: rgba(10,22,44,0.8); border-color: rgba(56,189,248,0.35); }

  /* ── STREAK WIDGET ── */
  .streak-widget {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
    border: 2px solid rgba(249,168,212,0.4); border-radius: 20px;
    padding: 14px 18px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 4px 16px rgba(249,168,212,0.12);
    animation: fadeIn 0.5s ease both;
  }
  .streak-left { display: flex; align-items: center; gap: 10px; }
  .streak-fire { font-size: 1.8rem; animation: fireWiggle 1.5s ease-in-out infinite; }
  @keyframes fireWiggle { 0%,100%{transform:rotate(-5deg) scale(1);} 50%{transform:rotate(5deg) scale(1.1);} }
  .streak-num { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.6rem; color: #f97316; line-height:1; }
  .streak-label { font-size:0.72rem; font-weight:700; color:var(--text-soft); margin-top:1px; }
  .streak-days { display:flex; gap:5px; }
  .streak-dot {
    width:10px; height:10px; border-radius:50%;
    background: var(--sky-soft); border: 1.5px solid rgba(125,211,252,0.4);
    transition: all 0.3s;
  }
  .streak-dot.active { background: linear-gradient(135deg,#f97316,#fb923c); border-color: #f97316; box-shadow: 0 0 6px rgba(249,115,22,0.5); }
  .streak-dot.today { background: linear-gradient(135deg,#4ade80,#22d3ee); border-color: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.3);} }

  /* ── CONFETTI CANVAS ── */
  #confetti-canvas {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:999;
  }

  /* ── MISSED ITEMS REVIEW ── */
  .missed-section { margin-top: 20px; }
  .missed-title {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:1rem; color:var(--text);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .missed-item {
    background: rgba(255,255,255,0.75); backdrop-filter:blur(8px);
    border: 2px solid rgba(252,165,165,0.4); border-radius:16px; padding:16px 18px;
    margin-bottom:12px; animation: fadeIn 0.4s ease both;
  }
  .missed-q { font-size:0.9rem; font-weight:700; color:var(--text); margin-bottom:10px; line-height:1.5; }
  .missed-your { font-size:0.8rem; font-weight:700; color:#b91c1c; margin-bottom:4px; }
  .missed-correct { font-size:0.8rem; font-weight:700; color:#15803d; }
  body.dark .missed-your { color:#f87171; }
  body.dark .missed-correct { color:#4ade80; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">☀️</button>
<div class="app" id="app">
  <header class="header">
    <div class="emoji-row">🩵 ✨ 🌸 ✨ 🩵</div>
    <h1>Psychometrician<br/>Board Exam Reviewer</h1>
    <p>Study smart, future Psychometrician! 💙</p>
  </header>
  <div class="breadcrumb" id="breadcrumb" style="display:none"></div>
  <div class="screen" id="screen"></div>
  <div class="footer">Made with 🩵 for you &nbsp;·&nbsp; You've got this! ✨</div>
</div>
<script>
const SUBJECTS = [
  { id:"abnormal",      label:"Abnormal Psychology",      icon:"🧠", desc:"Psychopathology & mental disorders" },
  { id:"developmental", label:"Developmental Psychology", icon:"🌱", desc:"Growth across the lifespan" },
  { id:"assessment",    label:"Psychological Assessment", icon:"📋", desc:"Testing, measurement & evaluation" },
  { id:"industrial",    label:"Industrial Psychology",    icon:"💼", desc:"Workplace behavior & organizations" },
];
const SETS = ["Set 1","Set 2","Set 3","Set 4"];

// ============================================================
// QUESTIONS DATABASE
// Each entry: { q: "question", choices: ["a","b","c","d"], answer: index_of_correct }
// Choices are shuffled randomly each session — only the answer INDEX matters.
// ============================================================
const QUESTIONS = {

  abnormal: [
    [ 
  {
    q: "A branch of psychology that deals with helping a person with behavioral disorders cope.",
    choices: [
      "a) Psychopathology",
      "b) Clinical Psychology",
      "c) Abnormal Psychology",
      "d) Psychiatry"
    ],
    answer: 1 // B
  },
  {
    q: "Abnormality seen when an individual violates cultural practices.",
    choices: [
      "a) Norm Violation",

// STATE

let state = { view:"home", subject:null, setIndex:null, questions:[], current:0, score:0, answered:false, selectedChoice:null, missed:[], reviewingMissed:false };

// =============================================
// UTILS
// =============================================
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleQuestion(q) {
  const indexed=q.choices.map((c,i)=>({text:c,isCorrect:i===q.answer}));
  const s=shuffle(indexed);
  return { q:q.q, choices:s.map(c=>c.text), answer:s.findIndex(c=>c.isCorrect) };
}
function getSubject(id){ return SUBJECTS.find(s=>s.id===id); }
const letters=['A','B','C','D','E','F'];

function toggleDark(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  document.getElementById('darkToggle').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('psych_dark',isDark?'1':'0');
}

// =============================================
// STREAK TRACKER
// =============================================
function getStreak(){
  try{
    const data=JSON.parse(localStorage.getItem('psych_streak')||'{}');
    return { count: data.count||0, lastDate: data.lastDate||null };
  }catch(e){ return {count:0,lastDate:null}; }
}
function resetStreak(){
  localStorage.removeItem('psych_streak');
  render();
}
function updateStreak(){
  const today=new Date().toISOString().slice(0,10);
  let s=getStreak();
  if(s.lastDate===today) return;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(s.lastDate===yesterday) s.count++;
  else s.count=1;
  s.lastDate=today;
  localStorage.setItem('psych_streak',JSON.stringify(s));
}
function streakHTML(){
  const s=getStreak();
  const count=s.count;
  return `<div class="streak-widget">
    <div class="streak-left">
      <div class="streak-fire">🔥</div>
      <div><div class="streak-num">${count}</div><div class="streak-label">day streak</div></div>
    </div>
  </div>`;
}

// =============================================
// CONFETTI
// =============================================
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#7dd3fc','#f9a8d4','#c4b5fd','#4ade80','#fbbf24','#f87171','#38bdf8','#a5f3fc'];
  for(let i=0;i<160;i++){
    pieces.push({
      x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*0.3,
      w:6+Math.random()*8, h:10+Math.random()*14,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360, rotSpeed:(Math.random()-0.5)*8,
      vx:(Math.random()-0.5)*4, vy:2+Math.random()*4,
      alpha:1
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpeed;
      if(frame>120) p.alpha=Math.max(0,p.alpha-0.012);
      ctx.save(); ctx.globalAlpha=p.alpha;
      ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<220) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// RENDER

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  const sub=state.subject?getSubject(state.subject):null;
  const setLabel=state.setIndex!==null?SETS[state.setIndex]:null;
  if(state.view==='home'){bc.style.display='none';return;}
  bc.style.display='flex';
  let h=`<span onclick="goHome()">🏠 Home</span>`;
  if(sub){
    h+=`<span class="sep">›</span>`;
    if(state.view==='sets') h+=`<span class="active">${sub.label}</span>`;
    else h+=`<span onclick="goSets()">${sub.label}</span>`;
  }
  if(setLabel&&(state.view==='quiz'||state.view==='results'))
    h+=`<span class="sep">›</span><span class="active">${setLabel}</span>`;
  bc.innerHTML=h;
}

function render(){
  renderBreadcrumb();
  const sc=document.getElementById('screen');
  if(state.view==='home') renderHome(sc);
  else if(state.view==='sets') renderSets(sc);
  else if(state.view==='quiz') renderQuiz(sc);
  else if(state.view==='results') renderResults(sc);
}

function renderHome(sc){
  let h=streakHTML();
  h+=`<div class="section-title">📚 Choose a Subject</div><div class="cards-grid">`;
  SUBJECTS.forEach(s=>{
    h+=`<div class="card" onclick="pickSubject('${s.id}')">
      <div class="card-icon">${s.icon}</div>
      <div class="card-content"><div class="card-title">${s.label}</div><div class="card-desc">${s.desc}</div></div>
      <div class="card-arrow">›</div></div>`;
  });
  sc.innerHTML=h+`</div>`;
}

function renderSets(sc){
  const sub=getSubject(state.subject);
  const icons=['🌷','🌼','🌻','🌺'];
  let h=`<button class="back-btn" onclick="goHome()">← Back</button>
    <div class="section-title">${sub.icon} ${sub.label}</div>
    <div class="section-title" style="font-size:0.9rem;color:var(--text-soft);margin-top:-10px;margin-bottom:18px;font-family:'Quicksand'">Pick a set to start reviewing 🌸</div>
    <div class="sets-grid">`;
  SETS.forEach((s,i)=>{
    const cnt=(QUESTIONS[state.subject][i]||[]).length;
    h+=`<div class="set-card" onclick="pickSet(${i})">
      <div class="set-icon">${icons[i]}</div>
      <div class="set-label">${s}</div>
      <div class="set-count">${cnt} question${cnt!==1?'s':''}</div></div>`;
  });
  sc.innerHTML=h+`</div>`;
}

function renderQuiz(sc){
  const q=state.questions[state.current];
  const total=state.questions.length;
  const pct=Math.round((state.current/total)*100);
  let h=`<button class="back-btn" onclick="goSets()">← Back to Sets</button>
    <div class="quiz-header">
      <div class="quiz-meta">
        <div class="quiz-progress-label">Question ${state.current+1} of ${total}</div>
        <div class="quiz-score-badge">✨ Score: ${state.score}/${state.current}</div>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-card">
      <span class="question-num">Q${state.current+1}</span>
      <div class="question-text">${q.q}</div>
    </div>
    <div class="choices" id="choices">`;
  q.choices.forEach((c,i)=>{
    h+=`<button class="choice-btn" id="choice-${i}" onclick="selectChoice(${i})">
      <span class="choice-letter">${letters[i]}</span>${c}</button>`;
  });
  h+=`</div><div id="feedback"></div>`;
  if(state.answered) h+=`<button class="next-btn" onclick="nextQuestion()">${state.current+1<total?'Next Question →':'See Results 🎉'}</button>`;
  sc.innerHTML=h;
  if(state.answered) applyAnswerUI(state.selectedChoice,q.answer);
}

function applyAnswerUI(selected,correct){
  const q=state.questions[state.current];
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===selected&&i===correct) btn.classList.add('correct');
    else if(i===selected&&i!==correct) btn.classList.add('wrong');
    else if(i===correct) btn.classList.add('reveal-correct');
  });
  const fb=document.getElementById('feedback');
  if(selected===correct){
    fb.innerHTML=`<div class="feedback-box correct-fb"><span class="feedback-icon">✅</span><span>Galing naman, tama po baby meng! 🩵</span></div>`;
  } else {
    fb.innerHTML=`<div class="feedback-box wrong-fb"><span class="feedback-icon">💡</span><span>The correct answer is: <strong>${letters[correct]}. ${q.choices[correct]}</strong></span></div>`;
  }
  if(document.getElementById('nba')) return;
  const btn=document.createElement('button');
  btn.className='next-btn'; btn.id='nba';
  btn.textContent=state.current+1<state.questions.length?'Next Question →':'See Results 🎉';
  btn.onclick=nextQuestion;
  fb.after(btn);
}

function renderResults(sc){
  const total=state.questions.length, score=state.score;
  const pct=Math.round((score/total)*100);
  let emoji,title,msg;
  if(pct===100){emoji="🏆";title="Perfect Score!";msg="Perfect mo loveee!!!!! 💯 Soaper galing proud ako sayo!🩵";}
  else if(pct>=80){emoji="🌸";title="Excellent Work!";msg="Cute taas naman score ng love love ko, deserve ng kiss😘";}
  else if(pct>=70){emoji="☁️";title="Keep Going!";msg="Pasadooo loveee!!! Galing naman ng Future Psychometrician ko!✨🤍";}
  else if(pct>=40){emoji="🌱";title="Kaya pa to ipush babyy, galingan mooo!🌻";msg="";}
  else{emoji="💙";title="Don't Give Up!";msg="Pag umabot ka sa gantong score, baka may mali na ang RGO wahaha!!!🤣";}

  // Build missed items section
  let missedHTML='';
  if(state.missed.length>0){
    missedHTML=`<div class="missed-section">
      <div class="missed-title">💡 Missed Items (${state.missed.length})</div>`;
    state.missed.forEach((m,i)=>{
      missedHTML+=`<div class="missed-item">
        <div class="missed-q">${i+1}. ${m.q}</div>
        <div class="missed-your">✗ Your answer: ${m.yourAnswer}</div>
        <div class="missed-correct">✓ Correct: ${m.correctAnswer}</div>
      </div>`;
    });
    missedHTML+=`</div>`;
  }

  sc.innerHTML=`<div class="results-card">
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${title}</div>
    <div class="results-sub">${SETS[state.setIndex]} · ${getSubject(state.subject).label}</div>
    <div class="score-circle">
      <div class="score-num">${score}</div>
      <div class="score-total">out of ${total}</div>
      <div class="score-pct">${pct}%</div>
    </div>
    <div class="results-message">${msg||title}</div>
    <div class="results-btns">
      <button class="btn-outline" onclick="retryQuiz()">🔄 Retry Set</button>
      <button class="btn-primary" onclick="goSets()">📚 Other Sets</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn-outline" style="width:100%" onclick="goHome()">🏠 Change Subject</button>
    </div>
  </div>${missedHTML}`;

  if(pct===100) launchConfetti();
}

// =============================================
// NAVIGATION
// =============================================
function goHome(){ state={view:"home",subject:null,setIndex:null,questions:[],current:0,score:0,answered:false,selectedChoice:null,missed:[],reviewingMissed:false}; render(); scrollTo({top:0,behavior:'smooth'}); }
function goSets(){ state.view='sets';state.setIndex=null;state.questions=[];state.current=0;state.score=0;state.answered=false;state.missed=[];state.reviewingMissed=false; render(); scrollTo({top:0,behavior:'smooth'}); }
function pickSubject(id){ state.subject=id;state.view='sets'; render(); scrollTo({top:0,behavior:'smooth'}); }
function pickSet(i){
  const raw=QUESTIONS[state.subject][i]||[];
  state.setIndex=i; state.questions=shuffle(raw.map(shuffleQuestion));
  state.current=0; state.score=0; state.answered=false; state.selectedChoice=null;
  state.missed=[]; state.reviewingMissed=false; state.view='quiz';
  render(); scrollTo({top:0,behavior:'smooth'});
}
function selectChoice(i){
  if(state.answered) return;
  state.answered=true; state.selectedChoice=i;
  const q=state.questions[state.current];
  if(i===q.answer){
    state.score++;
  } else {
    state.missed.push({ q:q.q, yourAnswer:q.choices[i], correctAnswer:q.choices[q.answer] });
  }
  applyAnswerUI(i,q.answer);
}
function nextQuestion(){
  state.current++; state.answered=false; state.selectedChoice=null;
  if(state.current>=state.questions.length) state.view='results';
  render(); scrollTo({top:0,behavior:'smooth'});
}
function retryQuiz(){ pickSet(state.setIndex); }
