function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleQuestion(q) {
  const indexed=q.choices.map((c,i)=>({text:c,isCorrect:i===q.answer}));
  const s=shuffle(indexed);
  return { q:q.q, choices:s.map(c=>c.text), answer:s.findIndex(c=>c.isCorrect) };
}

  const bc=document.getElementById('breadcrumb');
  const sub=state.subject?getSubject(state.subject):null;
  const setLabel=state.setIndex!==null?SETS[state.setIndex]:null;
  if(state.view==='home'){bc.style.display='none';return;}
  bc.style.display='flex';
  let h=`<span onclick="goHome()">🏠 Home</span>`;
  if(sub){
    h+=`<span class="sep">›</span>`;
    if(state.view==='sets') h+=`<span class="active">${sub.label}</span>`;
    else h+=`<span onclick="goSets()">${sub.label}</span>`;
  }
  if(setLabel&&(state.view==='quiz'||state.view==='results'))
    h+=`<span class="sep">›</span><span class="active">${setLabel}</span>`;
  bc.innerHTML=h;
}

function render(){
  renderBreadcrumb();
  const sc=document.getElementById('screen');
  if(state.view==='home') renderHome(sc);
  else if(state.view==='sets') renderSets(sc);
  else if(state.view==='quiz') renderQuiz(sc);
  else if(state.view==='results') renderResults(sc);
}

function renderHome(sc){
  let h=`<div class="section-title">📚 Choose a Subject</div><div class="cards-grid">`;
  SUBJECTS.forEach(s=>{
    h+=`<div class="card" onclick="pickSubject('${s.id}')">
      <div class="card-icon">${s.icon}</div>
      <div class="card-content"><div class="card-title">${s.label}</div><div class="card-desc">${s.desc}</div></div>
      <div class="card-arrow">›</div></div>`;
  });
  sc.innerHTML=h+`</div>`;
}

function renderSets(sc){
  const sub=getSubject(state.subject);
  const icons=['🌷','🌼','🌻','🌺'];
  let h=`<button class="back-btn" onclick="goHome()">← Back</button>
    <div class="section-title">${sub.icon} ${sub.label}</div>
    <div class="section-title" style="font-size:0.9rem;color:var(--text-soft);margin-top:-10px;margin-bottom:18px;font-family:'Quicksand'">Pick a set to start reviewing 🌸</div>
    <div class="sets-grid">`;
  SETS.forEach((s,i)=>{
    const cnt=(QUESTIONS[state.subject][i]||[]).length;
    h+=`<div class="set-card" onclick="pickSet(${i})">
      <div class="set-icon">${icons[i]}</div>
      <div class="set-label">${s}</div>
      <div class="set-count">${cnt} question${cnt!==1?'s':''}</div></div>`;
  });
  sc.innerHTML=h+`</div>`;
}

function renderQuiz(sc){
  const q=state.questions[state.current];
  const total=state.questions.length;
  const pct=Math.round((state.current/total)*100);
  let h=`<button class="back-btn" onclick="goSets()">← Back to Sets</button>
    <div class="quiz-header">
      <div class="quiz-meta">
        <div class="quiz-progress-label">Question ${state.current+1} of ${total}</div>
        <div class="quiz-score-badge">✨ Score: ${state.score}/${state.current}</div>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-card">
      <span class="question-num">Q${state.current+1}</span>
      <div class="question-text">${q.q}</div>
    </div>
    <div class="choices" id="choices">`;
  q.choices.forEach((c,i)=>{
    h+=`<button class="choice-btn" id="choice-${i}" onclick="selectChoice(${i})">
      <span class="choice-letter">${letters[i]}</span>${c}</button>`;
  });
  h+=`</div><div id="feedback"></div>`;
  if(state.answered) h+=`<button class="next-btn" onclick="nextQuestion()">${state.current+1<total?'Next Question →':'See Results 🎉'}</button>`;
  sc.innerHTML=h;
  if(state.answered) applyAnswerUI(state.selectedChoice,q.answer);
}

function applyAnswerUI(selected,correct){
  const q=state.questions[state.current];
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===selected&&i===correct) btn.classList.add('correct');
    else if(i===selected&&i!==correct) btn.classList.add('wrong');
    else if(i===correct) btn.classList.add('reveal-correct');
  });
  const fb=document.getElementById('feedback');
  if(selected===correct){
    fb.innerHTML=`<div class="feedback-box correct-fb"><span class="feedback-icon">✅</span><span>Galing naman, tama bo baby meng! 🩵</span></div>`;
  } else {
    fb.innerHTML=`<div class="feedback-box wrong-fb"><span class="feedback-icon">💡</span><span>The correct answer is: <strong>${letters[correct]}. ${q.choices[correct]}</strong></span></div>`;
  }
  if(document.getElementById('nba')) return;
  const btn=document.createElement('button');
  btn.className='next-btn'; btn.id='nba';
  btn.textContent=state.current+1<state.questions.length?'Next Question →':'See Results 🎉';
  btn.onclick=nextQuestion;
  fb.after(btn);
}

function renderResults(sc){
  const total=state.questions.length, score=state.score;
  const pct=Math.round((score/total)*100);
  let emoji,title,msg;
  if(pct===100){emoji="🏆";title="Perfect Score!";msg="Perfect mo loveee!!!!! 💯 Soaper galing proud ako sayo!🩵";}
  else if(pct>=80){emoji="🌸";title="Excellent Work!";msg="Cute taas naman score ng love love ko, deserve ng kiss😘";}
  else if(pct>=70){emoji="☁️";title="Keep Going!";msg="Pasadooo loveee!!! Galing naman ng Future Psychometrician ko!✨🤍";}
  else if(pct>=40){emoji="🌱";title="Kaya pa to ipush babyy, galingan mooo!🌻";}
  else{emoji="💙";title="Don't Give Up!";msg="Pag umabot ka sa gantong score, baka may mali na ang RGO wahaha!!!🤣";}
  sc.innerHTML=`<div class="results-card">
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${title}</div>
    <div class="results-sub">${SETS[state.setIndex]} · ${getSubject(state.subject).label}</div>
    <div class="score-circle">
      <div class="score-num">${score}</div>
      <div class="score-total">out of ${total}</div>
      <div class="score-pct">${pct}%</div>
    </div>
    <div class="results-message">${msg}</div>
    <div class="results-btns">
      <button class="btn-outline" onclick="retryQuiz()">🔄 Retry Set</button>
      <button class="btn-primary" onclick="goSets()">📚 Other Sets</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn-outline" style="width:100%" onclick="goHome()">🏠 Change Subject</button>
    </div></div>`;
}

// =============================================
// NAVIGATION
// =============================================
function goHome(){ state={view:"home",subject:null,setIndex:null,questions:[],current:0,score:0,answered:false,selectedChoice:null}; render(); scrollTo({top:0,behavior:'smooth'}); }
function goSets(){ state.view='sets';state.setIndex=null;state.questions=[];state.current=0;state.score=0;state.answered=false; render(); scrollTo({top:0,behavior:'smooth'}); }
function pickSubject(id){ state.subject=id;state.view='sets'; render(); scrollTo({top:0,behavior:'smooth'}); }
function pickSet(i){
  const raw=QUESTIONS[state.subject][i]||[];
  state.setIndex=i; state.questions=shuffle(raw.map(shuffleQuestion));
  state.current=0; state.score=0; state.answered=false; state.selectedChoice=null; state.view='quiz';
  render(); scrollTo({top:0,behavior:'smooth'});
}
function selectChoice(i){
  if(state.answered) return;
  state.answered=true; state.selectedChoice=i;
  if(i===state.questions[state.current].answer) state.score++;
  applyAnswerUI(i,state.questions[state.current].answer);
}
function nextQuestion(){
  state.current++; state.answered=false; state.selectedChoice=null;
  if(state.current>=state.questions.length) state.view='results';
  render(); scrollTo({top:0,behavior:'smooth'});
}
function retryQuiz(){ pickSet(state.setIndex); }

// =============================================
// BUBBLES
// =============================================
(function(){
  const colors=['#7dd3fc','#bae6fd','#f9a8d4','#c4b5fd','#a5f3fc'];
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='bubble';
    const size=20+Math.random()*80;
    el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*14}s;`;
    document.body.appendChild(el);
  }
})();

render();
</script>
</body>
</html>
